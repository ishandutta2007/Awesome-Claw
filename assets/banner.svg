<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>

    <!-- Accent Gradient for Lobster/Claw theme -->
    <linearGradient id="claw-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4530" />
      <stop offset="50%" stop-color="#ff6b4a" />
      <stop offset="100%" stop-color="#ff8e53" />
    </linearGradient>

    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes float {
        0%, 100% { transform: translate(150px, 200px) translateY(0px); }
        50% { transform: translate(150px, 200px) translateY(-8px); }
      }
      @keyframes pinch-top {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(5px) rotate(3deg); }
      }
      @keyframes pinch-bottom {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-5px) rotate(-3deg); }
      }
      @keyframes particle-flow-1 {
        0% { transform: translate(350px, 100px) translateX(0); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translate(350px, 100px) translateX(500px); opacity: 0; }
      }
      @keyframes particle-flow-2 {
        0% { transform: translate(350px, 200px) translateX(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translate(350px, 200px) translateX(550px); opacity: 0; }
      }
      @keyframes particle-flow-3 {
        0% { transform: translate(350px, 300px) translateX(0); opacity: 0; }
        10% { opacity: 0.5; }
        90% { opacity: 0.5; }
        100% { transform: translate(350px, 300px) translateX(480px); opacity: 0; }
      }
      @keyframes pulse-glow {
        0%, 100% { filter: drop-shadow(0 0 2px rgba(255, 69, 48, 0.2)); }
        50% { filter: drop-shadow(0 0 12px rgba(255, 69, 48, 0.6)); }
      }
      .animated-claw {
        animation: float 5s ease-in-out infinite;
        transform-origin: center;
      }
      .claw-outer {
        animation: pulse-glow 3s ease-in-out infinite;
      }
      .claw-inner-top {
        animation: pinch-top 2.5s ease-in-out infinite;
        transform-origin: -50px -20px;
      }
      .claw-inner-bottom {
        animation: pinch-bottom 2.5s ease-in-out infinite;
        transform-origin: -50px 20px;
      }
      .particle-1 { animation: particle-flow-1 5s linear infinite; }
      .particle-2 { animation: particle-flow-2 7s linear infinite 2s; }
      .particle-3 { animation: particle-flow-3 6s linear infinite 1s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)" rx="16" />

  <!-- Decorative Background Grid Pattern -->
  <g opacity="0.05">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" stroke="#ffffff" stroke-width="1" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Data Flow Particles -->
  <circle cx="0" cy="0" r="4" fill="#38bdf8" class="particle-1" />
  <circle cx="0" cy="0" r="5" fill="#ff6b4a" class="particle-2" />
  <circle cx="0" cy="0" r="3.5" fill="#34d399" class="particle-3" />

  <!-- Abstract Claw Graphic (Left) -->
  <g class="animated-claw" stroke="url(#claw-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Outer pincers -->
    <path class="claw-outer" d="M -80,-40 C -40,-90 40,-90 80,-40 C 90,-20 90,20 80,40 C 40,90 -40,90 -80,40" />
    <!-- Inner pincers / cutting edges -->
    <path class="claw-inner-top" d="M -50,-20 C -20,-50 20,-50 50,-20" />
    <path class="claw-inner-bottom" d="M -50,20 C -20,50 20,50 50,20" />
    <!-- Joint/base -->
    <path d="M 0,70 L 0,120" stroke-width="16" />
    <circle cx="0" cy="70" r="14" fill="#ff4530" stroke="none" />
  </g>

  <!-- Title & Subtitle (Right / Center) -->
  <g transform="translate(420, 0)">
    <!-- Main Title -->
    <text x="0" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="2">
      AWESOME <tspan fill="url(#claw-grad)">CLAW</tspan> 🦞
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#94a3b8" letter-spacing="0.5">
      A Curated Directory of OpenClaw Alternatives &amp; Ecosystems
    </text>

    <!-- Badges / Tags -->
    <g transform="translate(0, 280)">
      <!-- Badge 1: Local-First -->
      <rect x="0" y="0" width="130" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="65" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">Local-First</text>

      <!-- Badge 2: Open Source -->
      <rect x="145" y="0" width="140" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="215" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#34d399" text-anchor="middle">Open Source</text>

      <!-- Badge 3: Privacy-Focused -->
      <rect x="295" y="0" width="150" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
      <text x="370" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#a78bfa" text-anchor="middle">Privacy-Focused</text>
    </g>
  </g>
</svg>
